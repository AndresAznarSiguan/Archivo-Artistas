<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14564d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Archivo">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Archivo — Artistas y obras</title>
<style>
  :root{
    --paper:#f4f4ef;
    --paper-2:#fbfbf8;
    --ink:#1b1b18;
    --ink-soft:#55554d;
    --hair:#d9d9cf;
    --accent:#14564d;
    --accent-soft:#e3efeb;
    --danger:#8a3324;
    --radius:10px;
    --shadow:0 1px 2px rgba(0,0,0,.06), 0 8px 30px rgba(0,0,0,.08);
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:16px;
    line-height:1.45;
    -webkit-text-size-adjust:100%;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:920px;margin:0 auto;padding:0 16px}

  /* Header */
  header.app{
    padding:22px 16px 10px;
    border-bottom:1px solid var(--hair);
    background:var(--paper);
    position:sticky;top:0;z-index:5;
  }
  header.app .wrap{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;line-height:1.1}
  .brand h1{
    font-family:var(--serif);
    font-weight:600;
    font-size:26px;
    letter-spacing:.5px;
    margin:0;
  }
  .brand small{color:var(--ink-soft);font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
  .toolbar{display:flex;gap:8px;align-items:center}
  .ghost{
    background:none;border:1px solid var(--hair);color:var(--ink-soft);
    padding:7px 11px;border-radius:8px;font-size:13px;cursor:pointer;font-family:var(--sans);
  }
  .ghost:hover{border-color:var(--accent);color:var(--accent)}

  /* Quick add — the signature panel */
  .quick{
    background:var(--paper-2);
    border:1px solid var(--hair);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:14px;
    margin:18px 0;
  }
  .quick .qlabel{font-family:var(--serif);font-size:14px;color:var(--accent);margin:0 0 10px;letter-spacing:.04em}
  .qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field.wide{grid-column:1 / -1}
  .field label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
  input[type=text], input[type=number], select, textarea{
    font-family:var(--sans);font-size:15px;color:var(--ink);
    background:#fff;border:1px solid var(--hair);border-radius:8px;
    padding:10px 11px;width:100%;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
  .qrow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .qrow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
  .qsubmit{
    margin-top:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  }
  .btn{
    background:var(--accent);color:#fff;border:none;border-radius:8px;
    padding:11px 18px;font-size:15px;cursor:pointer;font-family:var(--sans);font-weight:500;
  }
  .btn:hover{filter:brightness(1.08)}
  .hint{font-size:12px;color:var(--ink-soft)}

  /* Tabs + search */
  .controls{display:flex;gap:10px;align-items:center;margin:6px 0 14px;flex-wrap:wrap}
  .tabs{display:inline-flex;border:1px solid var(--hair);border-radius:9px;overflow:hidden;background:#fff}
  .tabs button{
    border:none;background:none;padding:9px 16px;font-size:14px;cursor:pointer;color:var(--ink-soft);font-family:var(--sans);
  }
  .tabs button.active{background:var(--accent);color:#fff}
  .search{flex:1;min-width:160px}
  .count{font-size:12px;color:var(--ink-soft);margin-left:auto}

  /* Lists */
  .list{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--hair)}
  .row{
    display:flex;align-items:center;gap:13px;
    padding:13px 4px;border-bottom:1px solid var(--hair);cursor:pointer;
  }
  .row:hover{background:var(--paper-2)}
  .thumb{
    width:46px;height:46px;border-radius:7px;flex:none;object-fit:cover;background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;color:var(--accent);font-family:var(--serif);font-size:18px;
  }
  .row .meta{flex:1;min-width:0}
  .row .name{font-family:var(--serif);font-size:18px;line-height:1.2}
  .row .sub{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .badge{font-size:11px;color:var(--accent);border:1px solid var(--accent-soft);background:var(--accent-soft);border-radius:20px;padding:3px 9px;white-space:nowrap}

  .empty{
    text-align:center;padding:48px 20px;color:var(--ink-soft);
  }
  .empty b{display:block;font-family:var(--serif);color:var(--ink);font-size:20px;margin-bottom:6px}

  /* Detail overlay */
  .scrim{position:fixed;inset:0;background:rgba(20,20,16,.38);z-index:20;display:none}
  .scrim.show{display:block}
  .panel{
    position:fixed;top:0;right:0;height:100%;width:min(520px,100%);
    background:var(--paper);z-index:21;box-shadow:-10px 0 40px rgba(0,0,0,.18);
    transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column;
  }
  .panel.show{transform:translateX(0)}
  .panel header{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:16px;border-bottom:1px solid var(--hair);
  }
  .panel header .kind{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  .panel .body{padding:18px 16px 40px;overflow:auto}
  .panel h2{font-family:var(--serif);font-weight:600;font-size:24px;margin:2px 0 4px}
  .panel .dl{margin:14px 0;display:grid;grid-template-columns:auto 1fr;gap:7px 14px;font-size:14px}
  .panel .dl dt{color:var(--ink-soft);letter-spacing:.04em}
  .panel .photo{width:100%;border-radius:var(--radius);border:1px solid var(--hair);margin:8px 0;display:block}
  .panel .section-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin:22px 0 8px;border-top:1px solid var(--hair);padding-top:14px}

  /* connection chips — the interlinking signature */
  .links{display:flex;flex-direction:column;gap:6px}
  .clink{
    display:flex;align-items:center;gap:9px;text-align:left;
    background:#fff;border:1px solid var(--hair);border-radius:8px;padding:9px 11px;cursor:pointer;font-family:var(--sans);font-size:15px;color:var(--ink);
  }
  .clink:hover{border-color:var(--accent);background:var(--accent-soft)}
  .clink::before{content:"›";color:var(--accent);font-size:18px;line-height:1}
  .clink .cmeta{color:var(--ink-soft);font-size:12px}

  .pillrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .panel .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .danger{background:none;border:1px solid var(--danger);color:var(--danger);padding:9px 13px;border-radius:8px;cursor:pointer;font-size:14px}
  .editgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .editgrid .wide{grid-column:1/-1}
  textarea{min-height:74px;resize:vertical}
  .filebtn{display:inline-block}
  input[type=file]{display:none}
  .x{background:none;border:none;font-size:24px;line-height:1;color:var(--ink-soft);cursor:pointer;padding:4px 8px}

  .footer{padding:30px 16px 50px;color:var(--ink-soft);font-size:12px;text-align:center}

  /* sync modal */
  .modal-scrim{position:fixed;inset:0;background:rgba(20,20,16,.42);z-index:30;display:none;align-items:center;justify-content:center;padding:16px}
  .modal-scrim.show{display:flex}
  .modal{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow);width:min(420px,100%);max-height:90vh;overflow:auto;padding:20px}
  .modal h2{font-family:var(--serif);font-weight:600;font-size:22px;margin:0 0 4px}
  .modal p.sub{color:var(--ink-soft);font-size:13px;margin:0 0 14px;line-height:1.5}
  .modal .field{margin-bottom:10px;display:flex;flex-direction:column;gap:4px}
  .modal .field label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
  .modal .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;align-items:center}
  .modal .msg{font-size:13px;margin-top:10px;min-height:18px}
  .modal .msg.err{color:var(--danger)}
  .modal .msg.ok{color:var(--accent)}
  .syncdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#bbb;margin-right:6px;vertical-align:middle}
  .syncdot.on{background:var(--accent)}
  .info-block{margin:14px 0;border-top:1px solid var(--hair);padding-top:12px}
  .info-block:first-of-type{border-top:none;padding-top:0;margin-top:8px}
  .info-h{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
  .modal ul{margin:8px 0 0;padding-left:18px;font-size:14px}
  .modal li{margin:3px 0}
  .modal code{background:var(--accent-soft);padding:1px 5px;border-radius:4px;font-size:13px}
  .modal p:not(.sub){font-size:14px;line-height:1.5;margin:6px 0}

  @media (max-width:560px){
    .qgrid{grid-template-columns:1fr}
    .qrow2{grid-template-columns:1fr}
    .qrow3{grid-template-columns:1fr}
    .panel .dl{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header class="app">
  <div class="wrap">
    <div class="brand">
      <h1>Archivo</h1>
      <small>Artistas &amp; obras</small>
    </div>
    <div class="toolbar">
      <button class="ghost" id="btnSync">Sincronizar</button>
      <button class="ghost" id="btnExport">Copia de seguridad</button>
      <label class="ghost filebtn">Restaurar<input type="file" id="fileImport" accept="application/json"></label>
    </div>
  </div>
</header>

<main class="wrap">

  <!-- Quick add -->
  <section class="quick">
    <p class="qlabel">Añadir rápido</p>
    <div class="qgrid">
      <div class="field">
        <label for="qAutor">Autor</label>
        <input type="text" id="qAutor" list="artistNames" placeholder="Nombre del artista" autocomplete="off">
        <datalist id="artistNames"></datalist>
      </div>
      <div class="field">
        <label for="qObra">Obra</label>
        <input type="text" id="qObra" placeholder="Título de la obra" autocomplete="off">
      </div>
    </div>
    <div class="qrow3">
      <div class="field">
        <label for="qDisc">Disciplina (si el autor es nuevo)</label>
        <select id="qDisc">
          <option value="">—</option>
          <option>Escritor/a</option>
          <option>Pintor/a</option>
          <option>Escultor/a</option>
          <option>Fotógrafo/a</option>
          <option>Cineasta</option>
          <option>Músico/a</option>
          <option>Arquitecto/a</option>
          <option>Otra</option>
        </select>
      </div>
      <div class="field">
        <label for="qCat">Categoría de la obra</label>
        <select id="qCat">
          <option value="">—</option>
          <option>Libro</option>
          <option>Cuadro</option>
          <option>Escultura</option>
          <option>Fotografía</option>
          <option>Película</option>
          <option>Edificio</option>
          <option>Composición musical</option>
          <option>Otra</option>
        </select>
      </div>
      <div class="field">
        <label for="qAnio">Año de la obra</label>
        <input type="number" id="qAnio" placeholder="Ej. 1937" inputmode="numeric">
      </div>
    </div>
    <div class="qsubmit">
      <button class="btn" id="qAdd">Crear y enlazar</button>
      <span class="hint">Crea la obra, crea el autor si no existe, y los conecta. Pulsa Enter para guardar rápido.</span>
    </div>
  </section>

  <!-- Controls -->
  <div class="controls">
    <div class="tabs">
      <button id="tabObras" class="active">Obras</button>
      <button id="tabArtistas">Artistas</button>
    </div>
    <input type="text" class="search" id="search" placeholder="Buscar…">
    <span class="count" id="count"></span>
  </div>

  <div id="listHost"></div>

</main>

<div class="footer">
  Tus datos viven solo en este dispositivo. Haz copias de seguridad de vez en cuando.<br>
  <span id="usage" style="display:inline-block;margin-top:6px;color:var(--accent);cursor:pointer;text-decoration:underline"></span>
</div>

<!-- Detail panel -->
<div class="scrim" id="scrim"></div>
<aside class="panel" id="panel" aria-hidden="true">
  <header>
    <span class="kind" id="panelKind"></span>
    <button class="x" id="panelClose" aria-label="Cerrar">×</button>
  </header>
  <div class="body" id="panelBody"></div>
</aside>

<!-- Sync modal -->
<div class="modal-scrim" id="syncScrim">
  <div class="modal" id="syncModal"></div>
</div>

<!-- Storage info modal -->
<div class="modal-scrim" id="infoScrim">
  <div class="modal" id="infoModal"></div>
</div>

<script>
"use strict";

/* ---------- tiny IndexedDB layer ---------- */
const DB_NAME = "archivo-db";
const DB_VER = 1;
let _db = null;

function openDB(){
  return new Promise((res, rej)=>{
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains("artists")) db.createObjectStore("artists",{keyPath:"id"});
      if(!db.objectStoreNames.contains("works"))   db.createObjectStore("works",{keyPath:"id"});
    };
    r.onsuccess = ()=>{ _db = r.result; res(_db); };
    r.onerror = ()=> rej(r.error);
  });
}
function tx(store, mode){ return _db.transaction(store, mode).objectStore(store); }
function getAll(store){
  return new Promise((res,rej)=>{ const rq = tx(store,"readonly").getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); });
}
function getOne(store,id){
  return new Promise((res,rej)=>{ const rq = tx(store,"readonly").get(id); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>rej(rq.error); });
}
function put(store,obj){
  return new Promise((res,rej)=>{ const rq = tx(store,"readwrite").put(obj); rq.onsuccess=()=>res(obj); rq.onerror=()=>rej(rq.error); });
}
function del(store,id){
  return new Promise((res,rej)=>{ const rq = tx(store,"readwrite").delete(id); rq.onsuccess=()=>res(); rq.onerror=()=>rej(rq.error); });
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

/* ---------- state ---------- */
let artists = [];
let works = [];
let tab = "obras";
let term = "";

async function loadAll(){
  artists = await getAll("artists");
  works = await getAll("works");
  artists.sort((a,b)=> (a.name||"").localeCompare(b.name||"", "es"));
  works.sort((a,b)=> (a.title||"").localeCompare(b.title||"", "es"));
  updateUsage();
}

function fmtBytes(b){
  if(b<1024) return b+" B";
  if(b<1024*1024) return (b/1024).toFixed(0)+" KB";
  if(b<1024*1024*1024) return (b/1024/1024).toFixed(1)+" MB";
  return (b/1024/1024/1024).toFixed(2)+" GB";
}
function updateUsage(){
  try{
    const bytes = new Blob([JSON.stringify({artists, works})]).size;
    const imgs = artists.filter(a=>a.photo).length + works.filter(w=>w.photo).length;
    const el = document.getElementById("usage");
    if(el) el.textContent = `Espacio usado: ${fmtBytes(bytes)} · ${imgs} ${imgs===1?"imagen":"imágenes"} · ${artists.length} artistas · ${works.length} obras`;
  }catch(e){}
}

function artistById(id){ return artists.find(a=>a.id===id) || null; }
function worksByArtist(id){ return works.filter(w=> (w.artistIds||[]).includes(id)); }
function authorsOfWork(w){ return (w.artistIds||[]).map(artistById).filter(Boolean); }

/* ---------- rendering ---------- */
const $ = id => document.getElementById(id);
const listHost = $("listHost");

function refreshDatalist(){
  $("artistNames").innerHTML = artists.map(a=>`<option value="${escapeHtml(a.name)}">`).join("");
}

function escapeHtml(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function initials(name){ return (name||"·").trim().slice(0,1).toUpperCase(); }

function renderList(){
  const t = term.trim().toLowerCase();
  let rows = "";
  if(tab==="obras"){
    let items = works;
    if(t) items = items.filter(w=>{
      const auth = authorsOfWork(w).map(a=>a.name).join(" ").toLowerCase();
      return (w.title||"").toLowerCase().includes(t) || auth.includes(t) || (w.type||"").toLowerCase().includes(t);
    });
    $("count").textContent = items.length + (items.length===1?" obra":" obras");
    if(!items.length){ listHost.innerHTML = emptyState("obras"); return; }
    rows = items.map(w=>{
      const auth = authorsOfWork(w).map(a=>a.name).join(", ") || "Sin autor";
      const thumb = w.photo ? `<img class="thumb" src="${w.photo}" alt="">` : `<div class="thumb">${initials(w.title)}</div>`;
      const sub = [auth, w.year||""].filter(Boolean).join(" · ");
      return `<div class="row" data-kind="work" data-id="${w.id}">
        ${thumb}
        <div class="meta"><div class="name">${escapeHtml(w.title)}</div><div class="sub">${escapeHtml(sub)}</div></div>
        ${w.type?`<span class="badge">${escapeHtml(w.type)}</span>`:""}
      </div>`;
    }).join("");
  } else {
    let items = artists;
    if(t) items = items.filter(a=> (a.name||"").toLowerCase().includes(t) || (a.discipline||"").toLowerCase().includes(t) || (a.nationality||"").toLowerCase().includes(t));
    $("count").textContent = items.length + (items.length===1?" artista":" artistas");
    if(!items.length){ listHost.innerHTML = emptyState("artistas"); return; }
    rows = items.map(a=>{
      const n = worksByArtist(a.id).length;
      const thumb = a.photo ? `<img class="thumb" src="${a.photo}" alt="">` : `<div class="thumb">${initials(a.name)}</div>`;
      const sub = [a.discipline, a.nationality].filter(Boolean).join(" · ");
      return `<div class="row" data-kind="artist" data-id="${a.id}">
        ${thumb}
        <div class="meta"><div class="name">${escapeHtml(a.name)}</div><div class="sub">${escapeHtml(sub)}</div></div>
        <span class="badge">${n} ${n===1?"obra":"obras"}</span>
      </div>`;
    }).join("");
  }
  listHost.innerHTML = `<div class="list">${rows}</div>`;
}

function emptyState(kind){
  if(kind==="obras") return `<div class="empty"><b>Aún no hay obras</b>Usa “Añadir rápido” arriba: escribe la obra y su autor, y pulsa Crear y enlazar.</div>`;
  return `<div class="empty"><b>Aún no hay artistas</b>Se crean solos al añadir una obra, o aparecerán aquí cuando los registres.</div>`;
}

/* ---------- quick add ---------- */
async function quickAdd(){
  const title = $("qObra").value.trim();
  const author = $("qAutor").value.trim();
  if(!title){ $("qObra").focus(); return; }
  // warn if a work with the same title already exists
  const dupes = works.filter(x => (x.title||"").trim().toLowerCase() === title.toLowerCase());
  if(dupes.length){
    const who = dupes.map(x => authorsOfWork(x).map(a=>a.name).join(", ") || "sin autor").join("; ");
    const ok = confirm(`Ya existe una obra titulada «${title}» (${who}).\n¿Crear otra de todas formas?`);
    if(!ok){ $("qObra").focus(); $("qObra").select(); return; }
  }
  let artistId = null;
  if(author){
    let a = artists.find(x => (x.name||"").trim().toLowerCase() === author.toLowerCase());
    if(!a){
      a = { id:uid(), name:author, discipline:$("qDisc").value||"", nationality:"", born:"", died:"", notes:"", photo:"" };
      await put("artists", a);
    }
    artistId = a.id;
  }
  const w = { id:uid(), title, year:$("qAnio").value.trim(), type:$("qCat").value||"", notes:"", photo:"", artistIds: artistId?[artistId]:[] };
  await put("works", w);
  await loadAll();
  refreshDatalist();
  // reset for speed
  $("qObra").value=""; $("qAutor").value=""; $("qAnio").value=""; $("qDisc").value=""; $("qCat").value="";
  $("qAutor").focus();
  if(tab!=="obras"){ tab="obras"; setTabUI(); }
  renderList();
  schedulePush();
}

/* ---------- detail panel ---------- */
const panel = $("panel"), scrim = $("scrim");
function openPanel(){ panel.classList.add("show"); scrim.classList.add("show"); panel.setAttribute("aria-hidden","false"); }
function closePanel(){ panel.classList.remove("show"); scrim.classList.remove("show"); panel.setAttribute("aria-hidden","true"); }

async function showArtist(id){
  const a = artistById(id); if(!a) return;
  $("panelKind").textContent = "Artista";
  const list = worksByArtist(id);
  const worksHtml = list.length
    ? `<div class="links">${list.map(w=>`<button class="clink" data-go="work" data-id="${w.id}">${escapeHtml(w.title)} ${w.year?`<span class="cmeta">(${escapeHtml(w.year)})</span>`:""}</button>`).join("")}</div>`
    : `<p class="hint">Todavía sin obras enlazadas.</p>`;

const CATEGORIES = ["Libro","Cuadro","Escultura","Fotografía","Película","Edificio","Composición musical","Otra"];
function catOptions(sel){

/* ---------- photos (resized to keep files small) ---------- */
function handlePhoto(e, store, id, after){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    const img = new Image();
    img.onload = async ()=>{
      const max = 1200;
      let {width:wd, height:ht} = img;
      if(wd>max || ht>max){ const s = Math.min(max/wd, max/ht); wd=Math.round(wd*s); ht=Math.round(ht*s); }
      const c = document.createElement("canvas"); c.width=wd; c.height=ht;
      c.getContext("2d").drawImage(img,0,0,wd,ht);
      const data = c.toDataURL("image/jpeg", 0.82);
      const rec = await getOne(store, id); rec.photo = data; await put(store, rec);
      await loadAll(); renderList(); after();
      uploadPhoto(store, id, data);
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

/* ---------- export / import ---------- */
function exportData(){
  const payload = { app:"archivo", version:1, exported:new Date().toISOString(), artists, works };
  const blob = new Blob([JSON.stringify(payload)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date().toISOString().slice(0,10);
  a.href=url; a.download=`archivo-copia-${d}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function importData(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data || !Array.isArray(data.artists) || !Array.isArray(data.works)) throw new Error("formato");
      if(!confirm("Restaurar esta copia añadirá/actualizará artistas y obras. ¿Continuar?")) return;
      for(const a of data.artists) await put("artists", a);
      for(const w of data.works) await put("works", w);
      await loadAll(); refreshDatalist(); renderList();
      alert("Copia restaurada.");
      schedulePush();
    }catch(err){ alert("No se pudo leer el archivo. Asegúrate de elegir una copia de Archivo (.json)."); }
    e.target.value="";
  };
  reader.readAsText(file);
}

/* ---------- sync (Supabase) ---------- */
const SB_CFG_KEY = "archivo-sb-config";
const SB_SEEDED_KEY = "archivo-sb-seeded";
let sb = null, sbSession = null, pushTimer = null, rtChannel = null, sbLastEmail = "";

function loadSbConfig(){ try{ return JSON.parse(localStorage.getItem(SB_CFG_KEY)||"null"); }catch(e){ return null; } }
function saveSbConfig(cfg){ try{ localStorage.setItem(SB_CFG_KEY, JSON.stringify(cfg)); }catch(e){} }
function clearSbConfig(){ try{ localStorage.removeItem(SB_CFG_KEY); localStorage.removeItem(SB_SEEDED_KEY); }catch(e){} }

async function ensureClient(){
  if(sb) return sb;
  const cfg = loadSbConfig();
  if(!cfg || !cfg.url || !cfg.key) return null;
  const mod = await import("https://esm.sh/@supabase/supabase-js@2");
  sb = mod.createClient(cfg.url, cfg.key);
  return sb;
}

function setSyncBadge(){ const b=$("btnSync"); if(b) b.textContent = sbSession ? "Sincronizado" : "Sincronizar"; }

const syncScrim = $("syncScrim");
function openSync(){ syncScrim.classList.add("show"); renderSyncUI(); }
function closeSync(){ syncScrim.classList.remove("show"); }

function renderSyncUI(msg, cls){
  const cfg = loadSbConfig();
  const m = $("syncModal");
  if(!cfg){
    m.innerHTML = `
      <h2>Sincronización</h2>
      <p class="sub">Conecta tu proyecto de Supabase para mantener el móvil y el PC al día. Pega los dos datos que copiaste.</p>
      <div class="field"><label>Project URL</label><input type="text" id="sbUrl" placeholder="https://....supabase.co" autocomplete="off"></div>
      <div class="field"><label>Publishable key</label><input type="text" id="sbKey" placeholder="sb_publishable_..." autocomplete="off"></div>
      <div class="actions"><button class="btn" id="sbConnect">Conectar</button><button class="ghost" id="sbClose">Cerrar</button></div>
      <div class="msg ${cls||''}" id="sbMsg">${msg?escapeHtml(msg):""}</div>`;
    $("sbConnect").onclick = async ()=>{
      let url = $("sbUrl").value.trim();
      if(url && !/^https?:\/\//i.test(url)) url = "https://" + url;
      try{ url = new URL(url).origin; }catch(e){}
      const key = $("sbKey").value.trim();
      if(!url||!key){ renderSyncUI("Pega los dos datos.","err"); return; }
      saveSbConfig({url,key}); sb=null;
      try{ await ensureClient(); renderSyncUI(); }
      catch(e){ clearSbConfig(); renderSyncUI("No se pudo conectar. Revisa la URL, la clave y tu conexión.","err"); }
    };
    $("sbClose").onclick = closeSync;
    return;
  }
  if(!sbSession){
    m.innerHTML = `
      <h2>Entrar</h2>
      <p class="sub">Identifícate con el correo y la contraseña que creaste en Supabase.</p>
      <div class="field"><label>Correo</label><input type="email" id="sbEmail" autocomplete="username" value="${escapeHtml(sbLastEmail)}"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="sbPass" autocomplete="current-password"></div>
      <div class="actions"><button class="btn" id="sbLogin">Entrar</button><button class="ghost" id="sbClose">Cerrar</button></div>
      <div class="actions" style="margin-top:2px"><button class="ghost" id="sbForget" style="font-size:12px">Cambiar de proyecto</button></div>
      <div class="msg ${cls||''}" id="sbMsg">${msg?escapeHtml(msg):""}</div>`;
    $("sbLogin").onclick = doLogin;
    $("sbClose").onclick = closeSync;
    $("sbForget").onclick = ()=>{ clearSbConfig(); sb=null; renderSyncUI(); };
    return;
  }
  m.innerHTML = `
    <h2>Sincronización activa</h2>
    <p class="sub"><span class="syncdot on"></span>Conectado como ${escapeHtml(sbSession.user.email||"")}</p>
    <p class="sub">Tus artistas y obras se sincronizan automáticamente. Las fotos, de momento, se quedan en cada dispositivo.</p>
    <div class="actions">
      <button class="btn" id="sbSyncNow">Sincronizar ahora</button>
      <button class="ghost" id="sbLogout">Cerrar sesión</button>
      <button class="ghost" id="sbClose">Cerrar</button>
    </div>
    <div class="msg ${cls||'ok'}" id="sbMsg">${msg?escapeHtml(msg):""}</div>`;
  $("sbSyncNow").onclick = async ()=>{ renderSyncUI("Sincronizando…"); await pullRemote(); await pushRemote(); await syncPhotos(); renderSyncUI("Hecho.","ok"); };
  $("sbLogout").onclick = doLogout;
  $("sbClose").onclick = closeSync;
}

async function doLogin(){
  const email = $("sbEmail")?$("sbEmail").value.trim():"";
  const pass = $("sbPass")?$("sbPass").value:"";
  sbLastEmail = email;
  if(!email || !pass){ renderSyncUI("Pon tu correo y tu contraseña.","err"); return; }
  renderSyncUI("Entrando…");
  try{
    const c = await ensureClient();
    if(!c){ renderSyncUI("Falta configurar el proyecto.","err"); return; }
    const { data, error } = await c.auth.signInWithPassword({ email, password: pass });
    if(error){ renderSyncUI("No se pudo entrar: "+error.message,"err"); return; }
    sbSession = data.session; setSyncBadge();
    await afterLogin();
    renderSyncUI("Conectado. Ya estás sincronizando.","ok");
  }catch(e){ renderSyncUI("Error de conexión. ¿Tienes internet?","err"); }
}

async function doLogout(){
  try{ const c = await ensureClient(); if(c) await c.auth.signOut(); }catch(e){}
  if(rtChannel && sb){ try{ sb.removeChannel(rtChannel); }catch(e){} rtChannel=null; }
  sbSession = null; setSyncBadge(); renderSyncUI();
}

async function afterLogin(){
  const remote = await fetchRemote();
  const seeded = localStorage.getItem(SB_SEEDED_KEY) === "1";
  const localEmpty = (artists.length===0 && works.length===0);
  const remoteEmpty = !remote || ((remote.artists||[]).length===0 && (remote.works||[]).length===0);
  if(!seeded){
    if(remoteEmpty && !localEmpty){ await pushRemote(); }
    else if(!remoteEmpty){ await unionMerge(remote); await pushRemote(); }
    try{ localStorage.setItem(SB_SEEDED_KEY,"1"); }catch(e){}
  } else if(remote){
    await mirror(remote);
  }
  await syncPhotos();
  subscribeRealtime();
}

async function fetchRemote(){
  try{
    const c = await ensureClient(); if(!c || !sbSession) return null;
    const { data, error } = await c.from("archives").select("data").eq("user_id", sbSession.user.id).maybeSingle();
    if(error || !data) return null;
    return data.data || null;
  }catch(e){ return null; }
}
function stripPhoto(r){ const o = Object.assign({}, r); delete o.photo; return o; }

async function pushRemote(){
  try{
    const c = await ensureClient(); if(!c || !sbSession) return;
    const payload = { artists: artists.map(stripPhoto), works: works.map(stripPhoto) };
    await c.from("archives").upsert({ user_id: sbSession.user.id, data: payload, updated_at: new Date().toISOString() });
  }catch(e){}
}
async function pullRemote(){ const r = await fetchRemote(); if(r) await mirror(r); await syncPhotos(); }

async function unionMerge(remote){
  const aL = new Map(artists.map(a=>[a.id,a])), wL = new Map(works.map(w=>[w.id,w]));
  for(const ra of (remote.artists||[])){ const loc=aL.get(ra.id); await put("artists", Object.assign({}, ra, {photo: keepPhoto(loc, ra)})); }
  for(const rw of (remote.works||[])){ const loc=wL.get(rw.id); await put("works", Object.assign({}, rw, {photo: keepPhoto(loc, rw)})); }
  await loadAll(); refreshDatalist(); renderList();
}
function keepPhoto(loc, rem){ return (loc && loc.photoPath===rem.photoPath) ? (loc.photo||"") : ""; }
async function mirror(remote){
  const rA = remote.artists||[], rW = remote.works||[];
  // Safety: an empty cloud must never wipe a device that has data. Push local up instead.
  if(rA.length===0 && rW.length===0 && (artists.length>0 || works.length>0)){
    await pushRemote();
    return;
  }
  const rAids = new Set(rA.map(a=>a.id)), rWids = new Set(rW.map(w=>w.id));
  const aL = new Map(artists.map(a=>[a.id,a])), wL = new Map(works.map(w=>[w.id,w]));
  for(const ra of rA){ const loc=aL.get(ra.id); await put("artists", Object.assign({}, ra, {photo: keepPhoto(loc, ra)})); }
  for(const rw of rW){ const loc=wL.get(rw.id); await put("works", Object.assign({}, rw, {photo: keepPhoto(loc, rw)})); }
  for(const a of artists){ if(!rAids.has(a.id)) await del("artists", a.id); }
  for(const w of works){ if(!rWids.has(w.id)) await del("works", w.id); }
  await loadAll(); refreshDatalist(); renderList();
}

/* ---------- photo storage (Supabase) ---------- */
let photoBusy = false;
function b64ToBlob(dataUrl){
  const parts = dataUrl.split(","); const head = parts[0]||""; const body = parts[1]||"";
  const mime = (head.match(/:(.*?);/)||[])[1] || "image/jpeg";
  const bin = atob(body); const len = bin.length; const arr = new Uint8Array(len);
  for(let i=0;i<len;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}
function blobToDataUrl(blob){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(blob); }); }
async function uploadPhoto(store, id, dataUrl){
  try{
    const c = await ensureClient(); if(!c || !sbSession) return;
    const rec = await getOne(store, id); if(!rec) return;
    const oldPath = rec.photoPath || "";
    const path = sbSession.user.id + "/" + store + "/" + id + "-" + Date.now() + ".jpg";
    const { error } = await c.storage.from("photos").upload(path, b64ToBlob(dataUrl), { upsert:true, contentType:"image/jpeg" });
    if(error) return;
    rec.photoPath = path; await put(store, rec);
    if(oldPath && oldPath!==path){ try{ await c.storage.from("photos").remove([oldPath]); }catch(e){} }
    await loadAll(); schedulePush();
  }catch(e){}
}
async function downloadPhoto(store, id, path){
  try{
    const c = await ensureClient(); if(!c || !sbSession) return;
    const { data, error } = await c.storage.from("photos").download(path);
    if(error || !data) return;
    const dataUrl = await blobToDataUrl(data);
    const rec = await getOne(store, id); if(!rec) return;
    rec.photo = dataUrl; await put(store, rec);
  }catch(e){}
}
async function removePhotoFile(path){
  try{ const c = await ensureClient(); if(c && sbSession && path) await c.storage.from("photos").remove([path]); }catch(e){}
}
async function syncPhotos(){
  if(photoBusy || !sbSession) return;
  photoBusy = true;
  try{
    const A = artists.slice(), W = works.slice();
    for(const a of A){ if(a.photo && !a.photoPath) await uploadPhoto("artists", a.id, a.photo); }
    for(const w of W){ if(w.photo && !w.photoPath) await uploadPhoto("works", w.id, w.photo); }
    const A2 = artists.slice(), W2 = works.slice();
    for(const a of A2){ if(a.photoPath && !a.photo) await downloadPhoto("artists", a.id, a.photoPath); }
    for(const w of W2){ if(w.photoPath && !w.photo) await downloadPhoto("works", w.id, w.photoPath); }
    await loadAll(); renderList();
  }catch(e){}
  finally{ photoBusy = false; }
}

function subscribeRealtime(){
  try{
    if(!sb || !sbSession) return;
    if(rtChannel){ try{ sb.removeChannel(rtChannel); }catch(e){} rtChannel=null; }
    rtChannel = sb.channel("archivo-rt")
      .on("postgres_changes", { event:"*", schema:"public", table:"archives", filter:"user_id=eq."+sbSession.user.id },
        async (payload)=>{ const d = payload && payload.new && payload.new.data; if(d){ await mirror(d); await syncPhotos(); } })
      .subscribe();
  }catch(e){}
}

function schedulePush(){
  if(!sbSession) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(()=>{ pushRemote(); }, 700);
}

async function openStorageInfo(){
  const m = $("infoModal");
  const dataBytes = new Blob([JSON.stringify({artists:artists.map(stripPhoto), works:works.map(stripPhoto)})]).size;
  const totalBytes = new Blob([JSON.stringify({artists, works})]).size;
  const photoBytes = Math.max(0, totalBytes - dataBytes);
  const nPhotos = artists.filter(a=>a.photo).length + works.filter(w=>w.photo).length;
  const nCloudPhotos = artists.filter(a=>a.photoPath).length + works.filter(w=>w.photoPath).length;
  let quotaLine = "";
  try{
    if(navigator.storage && navigator.storage.estimate){
      const est = await navigator.storage.estimate();
      if(est && est.quota){ quotaLine = `Espacio del navegador: ${fmtBytes(est.usage||0)} usados de ~${fmtBytes(est.quota)} disponibles.`; }
    }
  }catch(e){}
  let persisted = false;
  try{ if(navigator.storage && navigator.storage.persisted) persisted = await navigator.storage.persisted(); }catch(e){}
  const cloud = sbSession
    ? `Conectado como ${escapeHtml(sbSession.user.email||"")}. Las fotos (${nCloudPhotos}) se guardan en el cajón <code>photos</code> de tu proyecto Supabase. Eso sí puedes verlo como carpeta de verdad: en el panel de Supabase, entra en <b>Storage → photos</b>.`
    : "Sin sincronización activa: tus datos están solo en este dispositivo.";
  m.innerHTML = `
    <h2>Almacenamiento</h2>
    <p class="sub">Dónde vive cada cosa y cuánto ocupa.</p>
    <div class="info-block">
      <div class="info-h">En este dispositivo</div>
      <p>Todo se guarda en el almacén interno de este navegador (una base de datos llamada <code>archivo-db</code>). No es una carpeta que puedas abrir a mano: por seguridad, el navegador la mantiene oculta y la gestiona él.</p>
      <ul>
        <li>${artists.length} artistas · ${works.length} obras · ${nPhotos} fotos</li>
        <li>Datos: ${fmtBytes(dataBytes)} · Fotos: ${fmtBytes(photoBytes)}</li>
        ${quotaLine?`<li>${quotaLine}</li>`:""}
        <li>Protección contra borrado automático: ${persisted?"activada ✓":"no concedida"}</li>
      </ul>
    </div>
    <div class="info-block">
      <div class="info-h">En la nube</div>
      <p>${cloud}</p>
    </div>
    <div class="info-block">
      <div class="info-h">Tu copia portable</div>
      <p>El botón “Copia de seguridad” descarga un archivo con todo, en la carpeta que tú elijas. Esa sí es una carpeta tuya y abierta, y es tu red de seguridad.</p>
    </div>
    <div class="actions"><button class="ghost" id="infoClose">Cerrar</button></div>`;
  $("infoClose").onclick = ()=> $("infoScrim").classList.remove("show");
  $("infoScrim").classList.add("show");
}
$("infoScrim").addEventListener("click", e=>{ if(e.target===$("infoScrim")) $("infoScrim").classList.remove("show"); });
$("usage").onclick = openStorageInfo;

$("btnSync").onclick = openSync;
syncScrim.addEventListener("click", e=>{ if(e.target===syncScrim) closeSync(); });

/* ---------- boot ---------- */
(async function(){
  try{
    try{ if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); } }catch(e){}
    try{ if(navigator.storage && navigator.storage.persist){ await navigator.storage.persist(); } }catch(e){}
    await openDB(); await loadAll(); refreshDatalist(); setTabUI(); renderList();
    // restore sync session if previously logged in
    try{
      if(loadSbConfig()){
        const c = await ensureClient();
        if(c){
          const { data } = await c.auth.getSession();
          if(data && data.session){ sbSession = data.session; setSyncBadge(); await afterLogin(); }
        }
      }
    }catch(e){}
  }catch(err){
    listHost.innerHTML = `<div class="empty"><b>No se pudo abrir el almacén</b>Prueba a abrir este archivo en Chrome o Firefox actualizados.</div>`;
    console.error(err);
  }
})();
</script>
</body>
</html>
